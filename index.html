<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta http-equiv="ScreenOrientation" content="autoRotate:disabled" />
    <meta name="theme-color" content="#d4e2e5" />
    <link rel="manifest" href="manifest.json" />
    <link rel="shortcut icon" href="assets/logo1.jpg" type="image/jpg" />
    <link rel="stylesheet" href="style.css" />
    <title>Dastyar</title>
  </head>
  <body>
    <div class="page page1 active">
      <div class="page1-row">
        <div class="clock">
          <h2 id="time">--:--</h2>
          <p id="date"></p>
          <p id="date2" dir="ltr"></p>
        </div>
        <div class="weather">
          <div class="row">
            <img id="weather-image" />
            <h2 id="weather"></h2>
          </div>
          <p id="date-description"></p>
          <p id="location"></p>
        </div>
      </div>

      <div id="aqi-card">
        <div id="aqi-info">
          <h2 id="city-name">تهران</h2>
          <p id="dominant-pol">آلودگی : PM2.5</p>
        </div>
        <p id="aqi-value"></p>
      </div>

      <ul class="task-list"></ul>
    </div>

    <div class="page page2">
      <div class="todo">
        <div class="inputs">
          <div class="col">
            <input type="text" id="task-title" placeholder="تسک" />
            <input type="text" id="task-description" placeholder="توضیحات" />
          </div>

          <button id="add-task-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 -960 960 960"
              height="35px"
              width="35px"
              fill="#293753"
            >
              <path
                d="M423.41-424.17H221.24q-23.67 0-40.13-16.63-16.46-16.62-16.46-39.96 0-23.67 16.46-40.13t40.13-16.46h202.17v-202.41q0-23.34 16.63-39.96 16.62-16.63 39.96-16.63t39.96 16.63q16.63 16.62 16.63 39.96v202.41h202.17q23.67 0 40.13 16.46t16.46 40.01q0 23.55-16.46 40.13-16.46 16.58-40.13 16.58H536.59V-222q0 23.34-16.63 39.96-16.62 16.63-39.96 16.63t-39.96-16.63q-16.63-16.62-16.63-39.96v-202.17Z"
              ></path>
            </svg>
          </button>
        </div>

        <ul class="task-list"></ul>
      </div>
    </div>

    <div class="page page3">
      <div id="tileContainer"></div>
    </div>

    <div class="page page4">
      <div class="tabs">
        <button class="tab-btn active" data-tab="digiato-list">دیجیاتو</button>
        <button class="tab-btn" data-tab="vigiato-list">ویجیاتو</button>
        <button class="tab-btn" data-tab="isna-list">مهر نیوز</button>
      </div>

      <div id="digiato-list" class="tab-content active">
        <ul class="news-list"></ul>
      </div>
      <div id="vigiato-list" class="tab-content">
        <ul class="news-list"></ul>
      </div>
      <div id="isna-list" class="tab-content">
        <ul class="news-list"></ul>
      </div>

      <div id="news-modal" class="modal">
        <div class="modal-content">
          <span class="close-btn">&times;</span>
          <div id="modal-img"></div>
          <div id="modal-title"></div>
          <div id="modal-content"></div>
        </div>
      </div>
    </div>

    <div class="page page5">
      <div class="calculator">
        <div class="display" id="display" dir="ltr"></div>
        <div class="buttons">
          <button class="button edge" onclick="appendToDisplay('/')">/</button>
          <button class="button edge" onclick="appendToDisplay(')')">(</button>
          <button class="button edge" onclick="appendToDisplay('(')">)</button>
          <button class="button edge" onclick="backspace()">C</button>

          <button class="button edge" onclick="appendToDisplay('*')">*</button>
          <button class="button" onclick="appendToDisplay('9')">9</button>
          <button class="button" onclick="appendToDisplay('8')">8</button>
          <button class="button" onclick="appendToDisplay('7')">7</button>

          <button class="button edge" onclick="appendToDisplay('-')">-</button>
          <button class="button" onclick="appendToDisplay('6')">6</button>
          <button class="button" onclick="appendToDisplay('5')">5</button>
          <button class="button" onclick="appendToDisplay('4')">4</button>

          <button class="button edge" onclick="appendToDisplay('+')">+</button>
          <button class="button" onclick="appendToDisplay('3')">3</button>
          <button class="button" onclick="appendToDisplay('2')">2</button>
          <button class="button" onclick="appendToDisplay('1')">1</button>

          <button class="button equal" onclick="calculate()">=</button>
          <button class="button" onclick="appendToDisplay('.')">.</button>
          <button class="button" onclick="appendToDisplay('0')">0</button>
          <button class="button" onclick="appendToDisplay('%')">%</button>

          <button class="button trigonometry" onclick="appendToDisplay('sin(')">
            sin
          </button>
          <button class="button trigonometry" onclick="appendToDisplay('cos(')">
            cos
          </button>
          <button class="button trigonometry" onclick="appendToDisplay('tan(')">
            tan
          </button>
          <button
            class="button trigonometry"
            onclick="appendToDisplay('cotg(')"
          >
            cotg
          </button>
        </div>
      </div>
    </div>

                </g>
                <g id="g567" transform="translate(6,7)">
                  <path

                    style="
                      fill: #293753;

                      stroke: none;
                    "
                    id="path569"
                  />
                </g>
                <g id="g571" transform="translate(10,7)">
                  <path
                    d="m 0,0 c -0.552,0 -1,-0.447 -1,-1 0,-0.553 0.448,-1 1,-1 0.552,0 1,0.447 1,1 0,0.553 -0.448,1 -1,1"
                    style="
                      fill: #293753;
                      fill-opacity: 1;
                      fill-rule: nonzero;
                      stroke: none;
                    "
                    id="path573"
                  />
                </g>
                <g id="g575" transform="translate(18,11)">
                  <path
                    d="m 0,0 c -0.552,0 -1,-0.447 -1,-1 0,-0.553 0.448,-1 1,-1 0.552,0 1,0.447 1,1 0,0.553 -0.448,1 -1,1"
                    style="
                      fill: #293753;

                    "
                    id="path577"
                  />
                </g>
                <g id="g579" transform="translate(14,6)">
                  <path
                    d="M 0,0 H 4"

                      fill: none;

                      stroke-linejoin: round;
                      stroke-miterlimit: 10;
                      stroke-dasharray: none;
                      stroke-opacity: 1;
                    "
                    id="path581"
                  />
                </g>
              </g>
            </g>
          </g>
        </svg>
      </button>

      <div class="btns-bar">
        <button data-page="page1" class="active">خانه</button>
        <button data-page="page2">تسک ها</button>
        <button data-page="page3">قیمت</button>
        <button data-page="page4">اخبار</button>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
