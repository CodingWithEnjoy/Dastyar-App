<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d4e2e5" />
    <link rel="manifest" href="manifest.json" />
    <link rel="shortcut icon" href="assets/logo1.jpg" type="image/jpg">
    <link rel="stylesheet" href="style.css" />
    <title>Dastyar</title>
  </head>
  <body>
    <div class="page page1 active">
      <div class="page1-row">
        <div class="clock">
          <h2 id="time">--:--</h2>
          <p id="date"></p>
          <p id="date2" dir="ltr"></p>
        </div>
        <div class="weather">
          <div class="row">
            <img id="weather-image" />
            <h2 id="weather"></h2>
          </div>
          <p id="date-description"></p>
          <p id="location"></p>
        </div>
      </div>

      <div id="aqi-card">
        <div id="aqi-info">
          <h2 id="city-name">تهران</h2>
          <p id="dominant-pol">آلودگی : ...</p>
        </div>
        <p id="aqi-value"></p>
      </div>

      <ul class="task-list"></ul>
    </div>

    <div class="page page2">
      <div class="todo">
        <div class="inputs">
          <div class="col">
            <input type="text" id="task-title" placeholder="تسک" />
            <input type="text" id="task-description" placeholder="توضیحات" />
          </div>

          <button id="add-task-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 -960 960 960"
              height="35px"
              width="35px"
              fill="#293753"
            >
              <path
                d="M423.41-424.17H221.24q-23.67 0-40.13-16.63-16.46-16.62-16.46-39.96 0-23.67 16.46-40.13t40.13-16.46h202.17v-202.41q0-23.34 16.63-39.96 16.62-16.63 39.96-16.63t39.96 16.63q16.63 16.62 16.63 39.96v202.41h202.17q23.67 0 40.13 16.46t16.46 40.01q0 23.55-16.46 40.13-16.46 16.58-40.13 16.58H536.59V-222q0 23.34-16.63 39.96-16.62 16.63-39.96 16.63t-39.96-16.63q-16.63-16.62-16.63-39.96v-202.17Z"
              ></path>
            </svg>
          </button>
        </div>

        <ul class="task-list"></ul>
      </div>
    </div>

    <div class="page page3">
      <div id="tileContainer"></div>
    </div>

    <div class="page page4">
      <ul id="newspaper-list"></ul>

      <div id="news-modal" class="modal">
        <div class="modal-content">
          <span class="close-btn">&times;</span>
          <div id="modal-img"></div>
          <div id="modal-title"></div>
          <div id="modal-content"></div>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <a href="javascript:location.reload(true)">
        <svg
          viewBox="0 0 511.494 511.494"
          width="25"
          height="25"
          fill="#293753"
        >
          <g>
            <path
              d="M478.291,255.492c-16.133,0.143-29.689,12.161-31.765,28.16c-15.37,105.014-112.961,177.685-217.975,162.315   S50.866,333.006,66.236,227.992S179.197,50.307,284.211,65.677c35.796,5.239,69.386,20.476,96.907,43.959l-24.107,24.107   c-8.33,8.332-8.328,21.84,0.004,30.17c4.015,4.014,9.465,6.262,15.142,6.246h97.835c11.782,0,21.333-9.551,21.333-21.333V50.991   c-0.003-11.782-9.556-21.331-21.338-21.329c-5.655,0.001-11.079,2.248-15.078,6.246l-28.416,28.416   C320.774-29.34,159.141-19.568,65.476,86.152S-18.415,353.505,87.304,447.17s267.353,83.892,361.017-21.828   c32.972-37.216,54.381-83.237,61.607-132.431c2.828-17.612-9.157-34.183-26.769-37.011   C481.549,255.641,479.922,255.505,478.291,255.492z"
            />
          </g>
        </svg>
      </a>

      <div class="btns-bar">
        <button data-page="page1" class="active">خانه</button>
        <button data-page="page2">تسک ها</button>
        <button data-page="page3">قیمت</button>
        <button data-page="page4">اخبار</button>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
